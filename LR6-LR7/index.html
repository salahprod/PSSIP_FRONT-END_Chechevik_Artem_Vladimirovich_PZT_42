<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сетка блоков | Фиксированная верстка</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
<div class="container">
    <div class="flex-grid">
        <!-- 1-й ряд: блок 1 -->
        <div class="row">
            <div class="block block-long">
                1
            </div>
        </div>

        <!-- 2-й ряд: 3 блока — блоки 2, 3, 4 -->
        <div class="row">
            <div class="block block-high">
                2
            </div>
            <div class="block block-high">
                3
            </div>
            <div class="block block-high">
                4
            </div>
        </div>

        <!-- 3-й ряд: 2 блока — блоки 5, 6 -->
        <div class="row row-three">
            <div class="block block-wide block-five">
                5
            </div>
            <div class="block block-wide block-six">
                6
            </div>
        </div>

        <!-- 4-й ряд: 3 блока — блоки 7, 8, 9 -->
        <div class="row">
            <div class="block block-triple">
                7
            </div>
            <div class="block block-triple">
                8
            </div>
            <div class="block block-triple">
                9
            </div>
        </div>
    </div>
</div>
</body>
</html>
